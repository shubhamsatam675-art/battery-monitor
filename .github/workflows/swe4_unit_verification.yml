name: SWE.4 Software Unit Verification

# Runs the verification automatically and shows a pass/fail result on GitHub.
on:
  push:
  pull_request:
  workflow_dispatch:   # lets you trigger it by hand from the Actions tab

jobs:
  unit-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Independent SWE.4 unit suite
        working-directory: backend
        run: node --test test/swe4_unit_verification.test.js

      - name: Developer regression suite
        working-directory: backend
        run: node --test test/verify.js

      - name: Static syntax check (all source units)
        working-directory: backend
        run: |
          for f in src/config.js src/bms.js src/server.js src/modules/*.js; do
            node --check "$f" && echo "OK  $f"
          done
